<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة المريض | HealthHub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="stylep.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* تحسينات إضافية للتصميم الاحترافي */
        .profile-card {
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
            margin-top: 20px;
        }
        .profile-header {
            background: linear-gradient(135deg, #3498db, #2ecc71);
            padding: 40px 20px;
            text-align: center;
            color: white;
        }
        .profile-img-container {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 15px;
        }
        .profile-img-container img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 4px solid white;
            object-fit: cover;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .upload-badge {
            position: absolute;
            bottom: 5px;
            right: 5px;
            background: white;
            color: #3498db;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        body { background: url("background.jpeg") center center / cover fixed no-repeat !important; }
        .profile-body {
            padding: 30px;
            background: #f0f4f8;
        }
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .info-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            transition: transform 0.3s;
        }
        .dark-theme .info-item { background: #2c3e50; }
        .info-item:hover { transform: translateY(-5px); }
        .info-item i { font-size: 24px; color: #3498db; margin-bottom: 10px; }
        .info-item label { display: block; font-size: 12px; color: #7f8c8d; }
        .info-item span { font-weight: bold; font-size: 16px; }
        
        /* تنسيق المودال الاحترافي */
        .success-screen {
            animation: scaleIn 0.5s ease;
        }
        @keyframes scaleIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body class="fade-animation">
    <!-- الهيدر العلوي -->
    <header class="main-header">
        <div class="logo-area" style="display: flex; align-items: center; gap: 10px;">
            <img src="logo.jpeg" alt="HealthHub" style="width: 40px; height: 40px; border-radius: 8px;">
            <h1 style="font-size: 20px; color: #2c3e50;">HealthHub</h1>
        </div>
        <div class="user-controls" style="display: flex; gap: 10px;">
            <button id="theme-toggle" class="icon-btn"><i class="fas fa-moon"></i></button>
            <button onclick="logout()" class="logout-btn" style="background: #e74c3c; color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer;"><i class="fas fa-sign-out-alt"></i> خروج</button>
        </div>
    </header>

    <main class="container" style="max-width: 1000px; margin: 20px auto; padding: 0 15px;">
        <!-- شريط التنقل -->
        <nav class="side-nav">
            <button class="nav-item active" onclick="switchTab('home', event)" style="flex: 1; padding: 10px; border: none; background: none; cursor: pointer; border-radius: 8px;">
                <i class="fas fa-home"></i> <span>الرئيسية</span>
            </button>
            <button class="nav-item" onclick="switchTab('my-appointments', event)" style="flex: 1; padding: 10px; border: none; background: none; cursor: pointer; border-radius: 8px;">
                <i class="fas fa-calendar-check"></i> <span> مواعيدي واشعاراتي</span>
            </button>
            <button class="nav-item" onclick="switchTab('my-health', event)" style="flex: 1; padding: 10px; border: none; background: none; cursor: pointer; border-radius: 8px;">
                <i class="fas fa-file-medical"></i> <span>حالتي الصحية</span>
            </button>
            <button class="nav-item" onclick="switchTab('profile', event)" style="flex: 1; padding: 10px; border: none; background: none; cursor: pointer; border-radius: 8px;">
                <i class="fas fa-user-circle"></i> <span>حسابي</span>
            </button>
        </nav>

        <!-- محتوى التبويبات -->
        <section id="tab-home" class="tab-content">
            <div class="welcome-banner">
                <h2 style="margin-bottom: 10px;">أهلاً بك، <span id="patient-name-display">جاري التحميل...</span> 👋</h2>
                <p>نتمنى لك دوام الصحة والعافية</p>
            </div>

            <div class="search-section card">
                <div class="search-bar" style="display: flex; align-items: center; background: #f8f9fa; padding: 10px 15px; border-radius: 10px;">
                    <i class="fas fa-search" style="color: #bdc3c7; margin-left: 10px;"></i>
                    <input type="text" id="doctor-search" placeholder="ابحث عن طبيب أو تخصص..." oninput="filterDoctors()" style="border: none; background: none; width: 100%; outline: none;">
                </div>
                <div id="recent-list" class="recent-searches" style="margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap;"></div>
            </div>

            <div class="doctors-section">
                <div class="section-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <h3 style="color: #2c3e50;">الأطباء المتاحون</h3>
                </div>
                <div id="doctors-cards" class="doctors-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px;">
                    <!-- سيتم ملؤه بواسطة JS -->
                </div>
            </div>
        </section>

        <section id="tab-my-appointments" class="tab-content hidden">
            <!-- قسم الإشعارات -->
            <div id="notifications-section" class="card" style="background: white; padding: 20px; border-radius: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 16px; display:none;">
                <h3 style="margin-bottom: 14px; color:#1a2940;"><i class="fas fa-bell" style="color: #e67e22;"></i> إشعاراتي</h3>
                
                <!-- تبويبات الإشعارات -->
                <div style="display: flex; gap: 10px; margin-bottom: 15px; border-bottom: 2px solid #eee;">
                    <button id="unread-tab" class="notification-tab" onclick="switchNotificationTab('unread')" style="padding: 10px 15px; background: none; border: none; border-bottom: 3px solid #e67e22; color: #e67e22; font-weight: bold; cursor: pointer;">
                        <i class="fas fa-inbox"></i> الإشعارات الجديدة
                    </button>
                    <button id="read-tab" class="notification-tab" onclick="switchNotificationTab('read')" style="padding: 10px 15px; background: none; border: none; border-bottom: 3px solid transparent; color: #999; font-weight: bold; cursor: pointer;">
                        <i class="fas fa-check-circle"></i> الإشعارات المقروءة
                    </button>
                </div>
                
                <!-- قائمة الإشعارات الجديدة -->
                <div id="notifications-list" class="notification-tab-content"></div>
                
                <!-- قائمة الإشعارات المقروءة -->
                <div id="read-notifications-list" class="notification-tab-content" style="display: none;"></div>
            </div>

            <div class="card" style="background: white; padding: 20px; border-radius: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);">
                <h3 style="margin-bottom: 20px;"><i class="fas fa-clock" style="color: #3498db;"></i> مواعيدي القادمة</h3>
                <div id="active-list" class="appointments-list"></div>
            </div>
        </section>

        <section id="tab-my-health" class="tab-content hidden">
            <!-- قسم رفع التحاليل - accordion -->
            <div style="background:white; border-radius:15px; box-shadow:0 2px 5px rgba(0,0,0,0.05); margin-bottom:16px; overflow:hidden;">
                <button onclick="toggleLabUploadPanel()" id="lab-upload-toggle"
                    style="width:100%; padding:16px 20px; background:none; border:none; display:flex; align-items:center; gap:10px; cursor:pointer; text-align:right;">
                    <i class="fas fa-flask" style="color:#9b59b6; font-size:18px;"></i>
                    <span style="font-size:15px; font-weight:700; color:#2c3e50; flex:1;">رفع تحاليل للدكتور</span>
                    <i class="fas fa-chevron-down" id="lab-upload-chevron" style="color:#9b59b6; transition:transform 0.3s;"></i>
                </button>
                <div id="lab-upload-panel" style="display:none; padding:0 20px 20px; border-top:1px solid #f0e6ff;">
                    <div style="display:flex; flex-direction:column; gap:12px; padding-top:14px;">
                        <div>
                            <label style="font-size:13px; color:#5a7a9a; display:block; margin-bottom:5px;"><i class="fas fa-user-md"></i> اختر الدكتور</label>
                            <select id="lab-doctor-select" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:8px; font-size:14px;">
                                <option value="">-- اختر دكتور --</option>
                            </select>
                        </div>
                        <div>
                            <label style="font-size:13px; color:#5a7a9a; display:block; margin-bottom:5px;"><i class="fas fa-vial"></i> اسم التحليل</label>
                            <input type="text" id="health-lab-name" placeholder="مثال: صورة دم كاملة، أشعة صدر..."
                                style="width:100%; box-sizing:border-box; padding:10px; border:1px solid #ddd; border-radius:8px; font-size:14px;">
                        </div>
                        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                            <label style="display:flex; flex-direction:column; align-items:center; justify-content:center; background:#f3e5f5; border:2px dashed #9b59b6; border-radius:10px; padding:14px; cursor:pointer; text-align:center;">
                                <i class="fas fa-image" style="font-size:22px; color:#9b59b6; margin-bottom:6px;"></i>
                                <span style="font-size:12px; color:#6c3483; font-weight:600;">رفع صورة</span>
                                <input type="file" id="health-lab-file" accept="image/*" hidden onchange="previewHealthLab(event)">
                            </label>
                            <div>
                                <textarea id="health-lab-text" rows="4" placeholder="أو اكتب نتيجة التحليل نصياً هنا..."
                                    style="width:100%; box-sizing:border-box; height:100%; padding:10px; border:1px solid #ddd; border-radius:10px; font-size:13px; resize:none;"></textarea>
                            </div>
                        </div>
                        <div id="health-lab-preview" style="display:none;">
                            <img id="health-lab-img" src="" style="max-width:100%; max-height:150px; border-radius:10px; border:1px solid #ddd;" alt="معاينة">
                            <button onclick="clearHealthLabFile()" style="margin-top:6px; background:#fee2e2; color:#e74c3c; border:none; padding:6px 12px; border-radius:6px; cursor:pointer; font-size:12px;">
                                <i class="fas fa-times"></i> حذف الصورة
                            </button>
                        </div>
                        <input type="text" id="health-lab-notes" placeholder="ملاحظات (اختياري)..."
                            style="width:100%; box-sizing:border-box; padding:10px; border:1px solid #ddd; border-radius:8px; font-size:14px;">
                        <button onclick="sendLabResult()" id="send-lab-btn"
                            style="background:#9b59b6; color:white; border:none; padding:12px; border-radius:10px; font-size:14px; font-weight:600; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px;">
                            <i class="fas fa-paper-plane"></i> إرسال التحليل للدكتور
                        </button>
                        <p id="lab-send-msg" style="text-align:center; font-size:13px; margin:0;"></p>
                    </div>
                </div>
            </div>

            <!-- تحاليلي المرسلة وردود الدكتور -->
            <div class="card" style="background: white; padding: 20px; border-radius: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 16px;">
                <h3 style="margin-bottom: 16px;"><i class="fas fa-comment-medical" style="color: #27ae60;"></i> تحاليلي المرسلة وردود الدكتور</h3>
                
                <!-- تبويبات التحاليل -->
                <div style="display: flex; gap: 10px; margin-bottom: 15px; border-bottom: 2px solid #eee;">
                    <button id="labs-new-tab" onclick="switchLabsTab('new')" style="padding: 10px 15px; background: none; border: none; border-bottom: 3px solid #27ae60; color: #27ae60; font-weight: bold; cursor: pointer;">
                        <i class="fas fa-envelope"></i> الردود الجديدة
                    </button>
                    <button id="labs-read-tab" onclick="switchLabsTab('read')" style="padding: 10px 15px; background: none; border: none; border-bottom: 3px solid transparent; color: #999; font-weight: bold; cursor: pointer;">
                        <i class="fas fa-archive"></i> الأرشيف (المقروءة)
                    </button>
                </div>

                <div id="patient-labs-list">
                    <div style="text-align:center; padding: 30px; color: #bdc3c7;">
                        <i class="fas fa-spinner fa-spin fa-2x"></i>
                        <p style="margin-top: 10px;">جاري التحميل...</p>
                    </div>
                </div>
                <div id="patient-labs-read-list" style="display:none;"></div>
            </div>

            <!-- الروشتات -->
            <div class="card" style="background: white; padding: 20px; border-radius: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);">
                <h3 style="margin-bottom: 20px;"><i class="fas fa-file-medical" style="color: #3498db;"></i> حالتي الصحية - الروشتات</h3>
                
                <!-- تبويبات الروشتات -->
                <div style="display: flex; gap: 10px; margin-bottom: 15px; border-bottom: 2px solid #eee;">
                    <button id="presc-new-tab" onclick="switchPrescTab('new')" style="padding: 10px 15px; background: none; border: none; border-bottom: 3px solid #3498db; color: #3498db; font-weight: bold; cursor: pointer;">
                        <i class="fas fa-file-medical"></i> الروشتات الجديدة
                    </button>
                    <button id="presc-read-tab" onclick="switchPrescTab('read')" style="padding: 10px 15px; background: none; border: none; border-bottom: 3px solid transparent; color: #999; font-weight: bold; cursor: pointer;">
                        <i class="fas fa-check-double"></i> الروشتات السابقة
                    </button>
                </div>

                <div id="prescriptions-list">
                    <div style="text-align:center; padding: 40px; color: #bdc3c7;">
                        <i class="fas fa-spinner fa-spin fa-2x"></i>
                        <p style="margin-top: 10px;">جاري تحميل الروشتات...</p>
                    </div>
                </div>
                <div id="prescriptions-read-list" style="display:none;"></div>
            </div>
        </section>

        <section id="tab-profile" class="tab-content hidden">
            <div class="profile-card">
                <div class="profile-header">
                    <div class="profile-img-container">
                        <img id="profile-img-display" src="https://via.placeholder.com/150" alt="صورة المريض">
                        <label for="upload-pic" class="upload-badge">
                            <i class="fas fa-camera"></i>
                            <input type="file" id="upload-pic" hidden accept="image/*" onchange="handleImageUpload(event)">
                        </label>
                    </div>
                    <h3 id="profile-name-title">بياناتي الصحية</h3>
                </div>

                <div class="profile-body">
                    <div id="profile-view">
                        <div class="info-grid">
                            <div class="info-item" onclick="toggleEditProfile(true)" style="cursor: pointer;">
                                <i class="fas fa-birthday-cake"></i>
                                <label>العمر</label>
                                <span id="display-age">--</span>
                            </div>
                            <div class="info-item" onclick="toggleEditProfile(true)" style="cursor: pointer;">
                                <i class="fas fa-tint"></i>
                                <label>فصيلة الدم</label>
                                <span id="display-blood">--</span>
                            </div>
                            <div class="info-item" onclick="toggleEditProfile(true)" style="cursor: pointer;">
                                <i class="fas fa-notes-medical"></i>
                                <label>حالة مزمنة</label>
                                <span id="display-disease">--</span>
                            </div>
                        </div>
                        <button class="btn-edit" onclick="toggleEditProfile(true)" style="width: 100%; padding: 12px; background: #3498db; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold;">
                            <i class="fas fa-user-edit"></i> تعديل البيانات
                        </button>
                    </div>

                    <div id="profile-edit" class="hidden">
                        <div class="edit-form" style="display: flex; flex-direction: column; gap: 15px;">
                            <div class="input-group">
                                <label style="display: block; margin-bottom: 5px; color: #7f8c8d;">الاسم الكامل</label>
                                <input type="text" id="input-name" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px;">
                            </div>
                            <div class="input-group">
                                <label style="display: block; margin-bottom: 5px; color: #7f8c8d;">العمر</label>
                                <input type="number" id="input-age" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px;">
                            </div>
                            <div class="input-group">
                                <label style="display: block; margin-bottom: 5px; color: #7f8c8d;">فصيلة الدم</label>
                                <select id="input-blood" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px;">
                                    <option value="A+">A+</option>
                                    <option value="A-">A-</option>
                                    <option value="B+">B+</option>
                                    <option value="B-">B-</option>
                                    <option value="O+">O+</option>
                                    <option value="O-">O-</option>
                                    <option value="AB+">AB+</option>
                                    <option value="AB-">AB-</option>
                                </select>
                            </div>
                            <div class="input-group">
                                <label style="display: block; margin-bottom: 5px; color: #7f8c8d;">أمراض مزمنة (إن وجد)</label>
                                <input type="text" id="input-disease" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px;">
                            </div>
                            <div class="form-actions" style="display: flex; gap: 10px; margin-top: 10px;">
                                <button class="btn-save" onclick="saveProfileData()" style="flex: 1; padding: 12px; background: #2ecc71; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold;">حفظ التغييرات</button>
                                <button class="btn-cancel" onclick="toggleEditProfile(false)" style="flex: 1; padding: 12px; background: #95a5a6; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold;">إلغاء</button>
                            </div>
                        </div>
                    </div>

                    <!-- قسم تغيير كلمة السر -->
                    <div style="border-top: 1px solid #e8ecf0; margin-top: 16px; padding-top: 16px;">
                        <div id="patient-change-pass-toggle" onclick="togglePatientChangePass()"
                            style="display:flex; align-items:center; justify-content:space-between; cursor:pointer; padding: 4px 0 10px;">
                            <span style="font-size:14px; font-weight:600; color:#3498db;">
                                <i class="fas fa-lock" style="margin-left:6px;"></i>تغيير كلمة السر
                            </span>
                            <i class="fas fa-chevron-down" id="patient-pass-chevron" style="color:#3498db; transition:transform 0.3s;"></i>
                        </div>
                        <div id="patient-change-pass-form" style="display:none; flex-direction:column; gap:10px;">
                            <div>
                                <label style="display:block; margin-bottom:4px; font-size:12px; color:#7f8c8d;">كلمة السر الحالية</label>
                                <input type="password" id="pat-old-password" placeholder="ادخل كلمة السر الحالية..."
                                    style="width:100%; box-sizing:border-box; padding:10px; border:1px solid #ddd; border-radius:8px; font-size:14px;">
                            </div>
                            <div>
                                <label style="display:block; margin-bottom:4px; font-size:12px; color:#7f8c8d;">كلمة السر الجديدة</label>
                                <input type="password" id="pat-new-password" placeholder="كلمة السر الجديدة..."
                                    style="width:100%; box-sizing:border-box; padding:10px; border:1px solid #ddd; border-radius:8px; font-size:14px;">
                            </div>
                            <div>
                                <label style="display:block; margin-bottom:4px; font-size:12px; color:#7f8c8d;">تأكيد كلمة السر الجديدة</label>
                                <input type="password" id="pat-confirm-new-password" placeholder="أعد كتابة كلمة السر..."
                                    style="width:100%; box-sizing:border-box; padding:10px; border:1px solid #ddd; border-radius:8px; font-size:14px;">
                            </div>
                            <button onclick="patientChangePassword()"
                                style="width:100%; padding:11px; background:#27ae60; color:white; border:none; border-radius:9px; font-size:14px; font-weight:600; cursor:pointer;">
                                <i class="fas fa-key"></i> تغيير كلمة السر
                            </button>
                            <p id="pat-change-pass-msg" style="text-align:center; font-size:13px; margin:0;"></p>
                        </div>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <!-- مودال الحجز -->
    <div id="booking-modal" class="modal hidden" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 2000; overflow-y:auto;">
        <div class="modal-content card-scale" style="background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 440px; text-align: center; margin: auto;">
            <div id="modal-details"></div>

            <!-- نوع الزيارة -->
            <div id="visit-type-group" style="margin-top:16px; text-align:right;">
                <label style="font-size:13px; color:#5a7a9a; font-weight:600; display:block; margin-bottom:8px;"><i class="fas fa-stethoscope"></i> نوع الزيارة:</label>
                <div style="display:flex; gap:10px;">
                    <label style="flex:1; display:flex; align-items:center; gap:6px; background:#e8f4fd; border:2px solid #3498db; border-radius:10px; padding:10px 12px; cursor:pointer;">
                        <input type="radio" name="visit-type" value="كشف" checked style="accent-color:#3498db;">
                        <span style="font-weight:600; color:#2c3e50;">🩺 كشف</span>
                    </label>
                    <label style="flex:1; display:flex; align-items:center; gap:6px; background:#e8f8f5; border:2px solid #2ecc71; border-radius:10px; padding:10px 12px; cursor:pointer;">
                        <input type="radio" name="visit-type" value="متابعة" style="accent-color:#2ecc71;">
                        <span style="font-weight:600; color:#2c3e50;">🔄 متابعة</span>
                    </label>
                </div>
            </div>

            <!-- رفع تحليل مع الحجز -->
            <div id="lab-upload-group" style="margin-top:16px; text-align:right; background:#fafafa; border:1px dashed #b2bec3; border-radius:12px; padding:14px;">
                <label style="font-size:13px; color:#5a7a9a; font-weight:600; display:block; margin-bottom:8px;"><i class="fas fa-flask"></i> إرسال تحليل للدكتور (اختياري):</label>
                <input type="text" id="lab-name-input" placeholder="اسم التحليل (مثال: صورة دم كاملة)..."
                    style="width:100%; box-sizing:border-box; padding:9px 12px; border:1px solid #ddd; border-radius:8px; font-size:13px; margin-bottom:8px;">
                <div style="display:flex; gap:8px; margin-bottom:8px;">
                    <label style="flex:1; text-align:center; background:#eaf3fb; border:1px solid #3498db; border-radius:8px; padding:8px; cursor:pointer; font-size:12px; color:#2980b9;">
                        <i class="fas fa-image"></i> رفع صورة
                        <input type="file" id="lab-file-input" accept="image/*,application/pdf" hidden onchange="previewLabFile(event)">
                    </label>
                    <div style="flex:1;">
                        <textarea id="lab-text-input" rows="2" placeholder="أو اكتب نتيجة التحليل نصياً..."
                            style="width:100%; box-sizing:border-box; padding:8px; border:1px solid #ddd; border-radius:8px; font-size:12px; resize:none;"></textarea>
                    </div>
                </div>
                <div id="lab-preview" style="display:none; margin-bottom:8px;">
                    <img id="lab-img-preview" style="max-width:100%; max-height:120px; border-radius:8px; border:1px solid #ddd;" src="" alt="معاينة">
                </div>
                <input type="text" id="lab-notes-input" placeholder="ملاحظات إضافية (اختياري)..."
                    style="width:100%; box-sizing:border-box; padding:9px 12px; border:1px solid #ddd; border-radius:8px; font-size:13px;">
            </div>

            <div class="modal-actions" style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="btn-confirm" onclick="confirmBooking()" style="flex: 1; padding: 12px; background: #3498db; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold;">تأكيد الحجز</button>
                <button class="btn-close" onclick="closeModal()" style="flex: 1; padding: 12px; background: #bdc3c7; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold;">إلغاء</button>
            </div>
        </div>
    </div>

    <!-- مودال تفاصيل الدكتور -->
    <div id="doctor-detail-modal" class="modal hidden" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); display:flex; align-items:center; justify-content:center; z-index:3000; overflow-y:auto;">
        <div style="background:white; border-radius:20px; width:92%; max-width:450px; overflow:hidden; margin:auto;">
            <div id="doctor-detail-content"></div>
            <div style="padding:16px;">
                <button onclick="closeDoctorDetail()" style="width:100%; padding:12px; background:#ecf0f1; color:#2c3e50; border:none; border-radius:10px; cursor:pointer; font-weight:bold;">إغلاق</button>
            </div>
        </div>
    </div>

    <script src="scriptpe.js"></script>
</body>
</html>
